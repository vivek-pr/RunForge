apiVersion: runforge.runforge.io/v1alpha1
kind: AIJob
metadata:
  name: aijob-success
spec:
  image: busybox:1.36
  command: ["sh", "-c"]
  args: ["echo hello-from-aijob && sleep 2"]
  env:
    - name: MODEL
      value: gpt-4.1-mini
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  restartPolicy: OnFailure
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 900
