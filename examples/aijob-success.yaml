apiVersion: runforge.runforge.io/v1alpha1
kind: AIJob
metadata:
  name: aijob-success
spec:
  image: ghcr.io/acme/ai-worker:1.2.3
  command: ["/app/worker"]
  args: ["run", "--task=success-case"]
  env:
    - name: MODEL
      value: gpt-4.1-mini
    - name: LOG_LEVEL
      value: info
  envFrom:
    - configMapRef:
        name: aijob-config
    - secretRef:
        name: aijob-secrets
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
      gpu: "1"
  restartPolicy: OnFailure
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 900
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations:
    - key: "workload"
      operator: "Equal"
      value: "ai"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values: ["linux"]
  serviceAccountName: runforge-ai
